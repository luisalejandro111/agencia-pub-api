<!-- app/templates/rol_nuevo.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Rol - SGOAP</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <a href="/dashboard" class="inline-block mb-6 text-indigo-600 hover:text-indigo-800">
            ← Volver al dashboard
        </a>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">➕ Crear Nuevo Rol</h1>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg">
                <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/roles">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del rol</label>
                    <input type="text" name="nombre" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                        placeholder="Ej: diseñador, rotulador">
                </div>

                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition">
                    Crear Rol
                </button>
            </form>
        </div>
    </div>
</body>
</html>
