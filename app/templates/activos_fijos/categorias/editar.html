<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar {{ categoria.nombre }} - Categorías</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/activos-fijos/" class="hover:text-indigo-600">Activos Fijos</a>
            <span class="mx-2">/</span>
            <a href="/activos-fijos/categorias/" class="hover:text-indigo-600">Categorías</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Editar Categoría</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-edit text-indigo-600 mr-3"></i>Editar Categoría
                </h1>
                <p class="text-slate-500 mt-1">Modificar: <strong>{{ categoria.nombre }}</strong></p>
            </div>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST" action="/activos-fijos/categorias/actualizar/{{ categoria.id }}" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nombre -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre *</label>
                    <input type="text" name="nombre" 
                           value="{{ categoria.nombre }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required maxlength="100">
                </div>
                
                <!-- Vida útil -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Vida Útil (años) *</label>
                    <input type="number" name="vida_util_anios" 
                           value="{{ categoria.vida_util_anios }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required min="1" max="50">
                </div>
                
                <!-- Tasa depreciación -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tasa Depreciación (%) *</label>
                    <input type="number" step="0.01" name="tasa_depreciacion" 
                           value="{{ "%.2f"|format(categoria.tasa_depreciacion) }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required min="0.01" max="100">
                </div>
                
                <!-- Estado -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Estado *</label>
                    <select name="activo" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                            required>
                        <option value="true" {% if categoria.activo %}selected{% endif %}>Activa</option>
                        <option value="false" {% if not categoria.activo %}selected{% endif %}>Inactiva</option>
                    </select>
                </div>
                
                <!-- Descripción -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                    <textarea name="descripcion" rows="3" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">{{ categoria.descripcion or '' }}</textarea>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    <i class="fas fa-save mr-2"></i> Guardar Cambios
                </button>
                <a href="/activos-fijos/categorias/" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-lg text-sm font-bold shadow-sm transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
