<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar {{ activo.nombre }} - Activos Fijos</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/activos-fijos/" class="hover:text-indigo-600">Activos Fijos</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Editar Activo</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-edit text-indigo-600 mr-3"></i>Editar Activo Fijo
                </h1>
                <p class="text-slate-500 mt-1">Modificar información de: <strong>{{ activo.nombre }}</strong></p>
            </div>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST" action="/activos-fijos/actualizar/{{ activo.id }}" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Código -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Código *</label>
                    <input type="text" name="codigo" 
                           value="{{ activo.codigo }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required maxlength="50">
                </div>
                
                <!-- Nombre -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre *</label>
                    <input type="text" name="nombre" 
                           value="{{ activo.nombre }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required maxlength="200">
                </div>
                
                <!-- Categoría -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Categoría *</label>
                    <select name="categoria_id" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                            required>
                        <option value="">Seleccionar categoría</option>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" {% if categoria.id == activo.categoria_id %}selected{% endif %}>
                            {{ categoria.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Estado -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Estado *</label>
                    <select name="estado" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                            required>
                        <option value="activo" {% if activo.estado == 'activo' %}selected{% endif %}>Activo</option>
                        <option value="inactivo" {% if activo.estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
                        <option value="en_reparacion" {% if activo.estado == 'en_reparacion' %}selected{% endif %}>En reparación</option>
                        <option value="dado_baja" {% if activo.estado == 'dado_baja' %}selected{% endif %}>Dado de baja</option>
                    </select>
                </div>
                
                <!-- Marca -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Marca</label>
                    <input type="text" name="marca" 
                           value="{{ activo.marca or '' }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Modelo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Modelo</label>
                    <input type="text" name="modelo" 
                           value="{{ activo.modelo or '' }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Número de serie -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Número de Serie</label>
                    <input type="text" name="numero_serie" 
                           value="{{ activo.numero_serie or '' }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Fecha de adquisición -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Fecha de Adquisición *</label>
                    <input type="date" name="fecha_adquisicion" 
                           value="{{ activo.fecha_adquisicion.strftime('%Y-%m-%d') }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required>
                </div>
                
                <!-- Costo inicial -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Costo Inicial ($)*</label>
                    <input type="number" step="0.01" name="costo_inicial" 
                           value="{{ "%.2f"|format(activo.costo_inicial) }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required min="0.01">
                </div>
                
                <!-- Valor residual -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Valor Residual ($)</label>
                    <input type="number" step="0.01" name="valor_residual" 
                           value="{{ "%.2f"|format(activo.valor_residual) }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Empleado asignado -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Empleado Asignado</label>
                    <select name="empleado_asignado_id" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">No asignado</option>
                        {% for empleado in empleados %}
                        <option value="{{ empleado.id }}" {% if empleado.id == activo.empleado_asignado_id %}selected{% endif %}>
                            {{ empleado.nombre_completo }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Ubicación -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Ubicación</label>
                    <input type="text" name="ubicacion" 
                           value="{{ activo.ubicacion or '' }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Descripción -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                    <textarea name="descripcion" rows="3" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">{{ activo.descripcion or '' }}</textarea>
                </div>
                
                <!-- Observaciones -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="2" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">{{ activo.observaciones or '' }}</textarea>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md transition flex items-center justify-center">
                    <i class="fas fa-save mr-2"></i> Guardar Cambios
                </button>
                <a href="/activos-fijos/ver/{{ activo.id }}" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-lg text-sm font-bold shadow-sm transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
