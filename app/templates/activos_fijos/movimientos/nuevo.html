<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Movimiento - {{ activo.nombre }}</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/activos-fijos/" class="hover:text-indigo-600">Activos Fijos</a>
            <span class="mx-2">/</span>
            <a href="/activos-fijos/ver/{{ activo.id }}" class="hover:text-indigo-600">Ver Activo</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Nuevo Movimiento</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-history text-indigo-600 mr-3"></i>Nuevo Movimiento
                </h1>
                <p class="text-slate-500 mt-1">Activo: <strong>{{ activo.nombre }}</strong> ({{ activo.codigo }})</p>
            </div>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST" action="/activos-fijos/movimientos/crear/{{ activo.id }}" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <input type="hidden" name="activo_id" value="{{ activo.id }}">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Tipo de movimiento -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Movimiento *</label>
                    <select name="tipo" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                            required onchange="toggleMovimientoFields(this.value)">
                        <option value="">Seleccionar tipo</option>
                        <option value="asignacion">Asignación</option>
                        <option value="desasignacion">Desasignación</option>
                        <option value="traslado">Traslado</option>
                        <option value="reparacion">Reparación</option>
                        <option value="baja">Baja</option>
                    </select>
                </div>
                
                <!-- Empleado asignado (condicional) -->
                <div id="empleadoField" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Empleado Asignado</label>
                    <select name="empleado_asignado_id" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">No asignado</option>
                        {% for empleado in empleados %}
                        <option value="{{ empleado.id }}">{{ empleado.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Ubicación nueva (condicional) -->
                <div id="ubicacionField" class="hidden md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nueva Ubicación</label>
                    <input type="text" name="ubicacion_nueva" 
                           placeholder="Ej: Oficina Diseño, Área de impresión"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Motivo -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Motivo *</label>
                    <textarea name="motivo" rows="3" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                              placeholder="Describe el motivo del movimiento..." required></textarea>
                </div>
                
                <!-- Observaciones -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="2" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                              placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition">
                    <i class="fas fa-save mr-2"></i> Registrar Movimiento
                </button>
                <a href="/activos-fijos/ver/{{ activo.id }}" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-lg text-sm font-bold shadow-sm transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>

    <script>
    function toggleMovimientoFields(tipo) {
        const empleadoField = document.getElementById('empleadoField');
        const ubicacionField = document.getElementById('ubicacionField');
        
        // Resetear campos
        empleadoField.classList.add('hidden');
        ubicacionField.classList.add('hidden');
        
        if (tipo === 'asignacion' || tipo === 'traslado') {
            empleadoField.classList.remove('hidden');
        }
        
        if (tipo === 'traslado' || tipo === 'reparacion') {
            ubicacionField.classList.remove('hidden');
        }
    }
    </script>
</body>
</html>
