<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Gasto</title>
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-edit text-amber-600"></i> Editar Gasto
            </h1>
            <a href="/finanzas/gastos" 
               class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1 font-medium">
                <i class="fas fa-arrow-left"></i> Volver 
            </a>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/finanzas/gastos/actualizar/{{ gasto.id }}" class="bg-white rounded-xl shadow-md p-6 space-y-6">
            <!-- Monto -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Monto (Bs)</label>
                <input type="number" step="0.01" name="monto" required
                       value="{{ '%.2f'|format(gasto.monto) }}"
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <!-- Fecha -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Fecha</label>
                <input type="date" name="fecha" required
                       value="{{ gasto.fecha.strftime('%Y-%m-%d') }}"
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <!-- Descripción -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Descripción</label>
                <textarea name="descripcion" rows="3" 
                          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500">{{ gasto.descripcion or '' }}</textarea>
            </div>
            
            <!-- Categoría y Subcategoría -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Categoría</label>
                    <select name="categoria_id" id="categoria_id" required
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500"
                            onchange="actualizarSubcategorias()">
                        <option value="">Seleccione una categoría</option>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" 
                                {% if gasto.categoria_id == categoria.id %}selected{% endif %}>
                            {{ categoria.nombre.replace('_', ' ').title() }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Subcategoría</label>
                    <select name="subcategoria_id" id="subcategoria_id" required
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
                        <option value="">Seleccione una subcategoría</option>
                        <!-- Se llenará dinámicamente -->
                    </select>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex gap-4 pt-4">
                <button type="submit" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white text-white px-6 py-3 rounded-xl font-bold">
                    <i class="fas fa-save mr-2"></i>Actualizar Gasto
                </button>
                <a href="/finanzas/gastos" 
                   class="border border-slate-300 text-slate-600 hover:bg-slate-50 px-4 py-2 rounded-lg transition">
                    Cancelar
                </a>
            </div>
        </form>
    </div>

    <script>
        // Datos para subcategorías (aseguramos formato JSON válido)
        const subcategoriasData = {{ subcategorias_por_categoria | tojson }};
        const gastoCategoriaId = {{ gasto.categoria_id }};
        const gastoSubcategoriaId = {{ gasto.subcategoria_id }};

        function actualizarSubcategorias() {
            const categoriaId = document.getElementById('categoria_id').value;
            const subcategoriaSelect = document.getElementById('subcategoria_id');
            
            // Limpiar opciones
            subcategoriaSelect.innerHTML = '<option value="">Seleccione una subcategoría</option>';
            
            if (!categoriaId) return;
            
            // Obtener subcategorías para esta categoría
            const subcategorias = subcategoriasData[categoriaId] || [];
            subcategorias.forEach(subcat => {
                const option = document.createElement('option');
                option.value = subcat.id;
                option.textContent = subcat.nombre.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
                if (subcat.id == gastoSubcategoriaId) {
                    option.selected = true;
                }
                subcategoriaSelect.appendChild(option);
            });
        }

        // Inicializar al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            const categoriaSelect = document.getElementById('categoria_id');
            if (categoriaSelect && categoriaSelect.value) {
                actualizarSubcategorias();
            }
        });
    </script>
</body>
</html>
