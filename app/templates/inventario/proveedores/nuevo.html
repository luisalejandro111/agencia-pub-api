<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Proveedor - Inventario</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/inventario/materiales" class="hover:text-indigo-600">Inventario</a>
            <span class="mx-2">/</span>
            <a href="/inventario/proveedores/" class="hover:text-indigo-600">Proveedores</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Nuevo Proveedor</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-plus-circle text-green-600 mr-3"></i>Nuevo Proveedor
                </h1>
                <p class="text-slate-500 mt-1">Registrar nuevo proveedor de materiales y servicios</p>
            </div>
            <div class="flex items-center gap-2">
                <a href="/inventario/proveedores/" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition">
                    <i class="fas fa-arrow-left mr-2"></i> Volver
                </a>
            </div>
        </div>

        <!-- Mensajes de error -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario principal -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <form method="POST" action="/inventario/proveedores/crear">
                
                <!-- Información básica -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nombre del Proveedor *</label>
                            <input type="text" name="nombre" 
                                   placeholder="Ej: Distribuidora XYZ, Imprenta ABC"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                                   required maxlength="100">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Persona de Contacto</label>
                            <input type="text" name="contacto" 
                                   placeholder="Nombre de la persona encargada"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Teléfono</label>
                            <input type="text" name="telefono" 
                                   placeholder="Ej: +58 412-1234567"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" name="email" 
                                   placeholder="contacto@proveedor.com"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">RUC / NIT / RFC</label>
                            <input type="text" name="ruc" 
                                   placeholder="Número de identificación fiscal"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Dirección</label>
                            <textarea name="direccion" rows="3"
                                      placeholder="Dirección física del proveedor"
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Botones -->
                <div class="flex gap-4 pt-6 border-t">
                    <button type="submit" 
                            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition">
                        <i class="fas fa-save"></i> Crear Proveedor
                    </button>
                    <a href="/inventario/proveedores/"
                       class="px-6 py-3 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition border border-gray-300 flex items-center justify-center">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
