<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Categoría - Inventario</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/inventario/materiales" class="hover:text-indigo-600">Inventario</a>
            <span class="mx-2">/</span>
            <a href="/inventario/categorias/" class="hover:text-indigo-600">Categorías</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Editar Categoría</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-edit text-indigo-600 mr-3"></i>Editar Categoría
                </h1>
                <p class="text-slate-500 mt-1">Actualizar categoría: <span class="font-semibold">{{ categoria.nombre }}</span></p>
            </div>
            <div class="flex items-center gap-2">
                <a href="/inventario/categorias/" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition">
                    <i class="fas fa-arrow-left mr-2"></i> Volver
                </a>
            </div>
        </div>

        <!-- Mensajes de error -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario principal -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <form method="POST" action="/inventario/categorias/actualizar/{{ categoria.id }}">
                
                <div class="grid grid-cols-1 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre de la Categoría *</label>
                        <input type="text" name="nombre" 
                               value="{{ categoria.nombre }}"
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                               required maxlength="100">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                        <textarea name="descripcion" rows="3"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">{{ categoria.descripcion or '' }}</textarea>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <input type="checkbox" name="activo" id="activo" {% if categoria.activo %}checked{% endif %} class="w-4 h-4 text-indigo-600 rounded">
                        <label for="activo" class="text-sm text-gray-700">Categoría activa</label>
                    </div>
                </div>
                
                <!-- Botones -->
                <div class="flex gap-4 pt-6 border-t">
                    <button type="submit" 
                            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-bold transition shadow-lg hover:shadow-xl flex justify-center items-center gap-2">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a href="/inventario/categorias/"
                       class="px-6 py-3 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition border border-gray-300 flex items-center justify-center">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
