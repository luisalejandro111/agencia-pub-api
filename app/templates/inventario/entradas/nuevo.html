<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Entrada - Inventario</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-hover { transition: transform 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); }
        .input-error { border-color: #ef4444 !important; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important; }
        .input-valid { border-color: #10b981 !important; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/inventario/entradas/" class="hover:text-indigo-600">Entradas</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Nueva Entrada</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-arrow-down text-green-600 mr-3"></i>Nueva Entrada
                </h1>
                <p class="text-slate-500 mt-1">Registrar compra de materiales</p>
            </div>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST" action="/inventario/entradas/crear" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Material -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Material *</label>
                    <select name="material_id" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                            required onchange="actualizarUnidadMedida()">
                        <option value="">Seleccionar material</option>
                        {% for material in materiales %}
                        <option value="{{ material.id }}" 
                                data-unidad="{{ material.unidad_medida }}"
                                data-m2porunidad="{{ material.m2_por_unidad }}"
                                data-nombre="{{ material.nombre }}">
                            {{ material.codigo }} - {{ material.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Proveedor -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Proveedor</label>
                    <select name="proveedor_id" 
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">Sin proveedor</option>
                        {% for proveedor in proveedores %}
                        <option value="{{ proveedor.id }}">{{ proveedor.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Sección dinámica según la unidad de medida -->
                <div id="seccionCantidad" class="md:col-span-2">
                    <div class="text-gray-500">Seleccione un material primero</div>
                </div>
                
                <!-- Número de factura -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Número de Factura</label>
                    <input type="text" name="numero_factura" 
                           placeholder="Ej: F001-000123"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Observaciones -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="3" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                              placeholder="Notas sobre la entrada..."></textarea>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md transition flex items-center justify-center">
                    <i class="fas fa-save mr-2"></i> Registrar Entrada
                </button>
                <a href="/inventario/entradas/" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-lg text-sm font-bold shadow-sm transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>

  <script>
function actualizarUnidadMedida() {
    const select = document.querySelector('select[name="material_id"]');
    const seccionCantidad = document.getElementById('seccionCantidad');
    const selectedOption = select.options[select.selectedIndex];
    
    if (!selectedOption.value) {
        seccionCantidad.innerHTML = '<div class="text-gray-500">Seleccione un material primero</div>';
        return;
    }
    
    const unidad = selectedOption.getAttribute('data-unidad');
    const m2PorUnidad = parseFloat(selectedOption.getAttribute('data-m2porunidad')) || 1.0;
    
    if (unidad === 'rollos' || unidad === 'unidades') {
        // Formulario para materiales que se compran en rollos/unidades
        seccionCantidad.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad de ${unidad}</label>
                    <input type="number" step="0.01" id="cantidad_unidades" 
                           placeholder="Ej: 2" 
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           oninput="calcularMetrosCuadrados(${m2PorUnidad})" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">M² por ${unidad}</label>
                    <input type="number" step="0.01" id="m2_por_unidad" 
                           value="${m2PorUnidad}" readonly
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Total m² (se guardará)</label>
                    <input type="number" step="0.01" name="cantidad" id="total_m2" 
                           placeholder="0.00" 
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition bg-green-50"
                           readonly required>
                    <p class="text-xs text-gray-500 mt-1">Este es el valor que se registrará en inventario</p>
                </div>
            </div>
            
            <!-- Precios -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Precio de Compra ($)*</label>
                    <input type="number" step="0.01" name="precio_compra" 
                           placeholder="0.00"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Precio de Venta ($)*</label>
                    <input type="number" step="0.01" name="precio_venta" 
                           placeholder="0.00"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required>
                </div>
            </div>
        `;
    } else {
        // Formulario para otras unidades (m², litros, etc.)
        seccionCantidad.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad (${unidad})*</label>
                    <input type="number" step="0.01" name="cantidad" 
                           placeholder="0.00"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Precio de Compra ($)*</label>
                    <input type="number" step="0.01" name="precio_compra" 
                           placeholder="0.00"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required>
                </div>
             
            </div>
        `;
    }
}

function calcularMetrosCuadrados(m2PorUnidad) {
    const cantidadUnidades = parseFloat(document.getElementById('cantidad_unidades').value) || 0;
    const totalM2 = cantidadUnidades * m2PorUnidad;
    
    document.getElementById('total_m2').value = totalM2.toFixed(2);
    
    // Validación visual
    const totalInput = document.getElementById('total_m2');
    if (totalM2 > 0) {
        totalInput.classList.remove('border-red-300');
        totalInput.classList.add('border-green-300');
    } else {
        totalInput.classList.remove('border-green-300');
        totalInput.classList.add('border-red-300');
    }
}

// Inicializar si hay un material preseleccionado
document.addEventListener('DOMContentLoaded', function() {
    const select = document.querySelector('select[name="material_id"]');
    if (select && select.value) {
        actualizarUnidadMedida();
    }
});
</script>
</body>
</html>
