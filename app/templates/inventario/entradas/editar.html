<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Entrada - {{ entrada.material.nombre }}</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Navegación -->
        <nav class="flex text-gray-500 text-xs mb-4 uppercase tracking-wider font-semibold">
            <a href="/dashboard" class="hover:text-indigo-600">Dashboard</a>
            <span class="mx-2">/</span>
            <a href="/inventario/entradas/" class="hover:text-indigo-600">Entradas</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">Editar</span>
        </nav>

        <!-- Encabezado -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    <i class="fas fa-edit text-indigo-600 mr-3"></i>Editar Entrada
                </h1>
                <p class="text-slate-500 mt-1">Modifica los datos de la entrada</p>
            </div>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <form method="POST" action="/inventario/entradas/editar/{{ entrada.id }}" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Material -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Material *</label>
                    <select name="material_id" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition" required>
                        {% for material in materiales %}
                        <option value="{{ material.id }}" {% if material.id == entrada.material_id %}selected{% endif %}>
                            {{ material.codigo }} - {{ material.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Proveedor -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Proveedor</label>
                    <select name="proveedor_id" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="">Sin proveedor</option>
                        {% for proveedor in proveedores %}
                        <option value="{{ proveedor.id }}" {% if proveedor.id == entrada.proveedor_id %}selected{% endif %}>
                            {{ proveedor.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Cantidad -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad *</label>
                    <input type="number" step="0.01" name="cantidad" 
                           value="{{ "%.2f"|format(entrada.cantidad) }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                           required min="0.01">
                </div>
                
                <!-- Precios -->
                <div class="md:col-span-2">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Precio Compra ($)*</label>
                            <input type="number" step="0.01" name="precio_compra" 
                                   value="{{ "%.2f"|format(entrada.precio_compra) }}"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                                   required min="0.01">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Precio Venta ($)</label>
                            <input type="number" step="0.01" name="precio_venta" 
                                   value="{{ "%.2f"|format(entrada.material.precio_venta) if entrada.material.precio_venta else '0.00' }}"
                                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition"
                                   min="0.01">
                        </div>
                    </div>
                </div>
                
                <!-- Número de factura -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Número de Factura</label>
                    <input type="text" name="numero_factura" 
                           value="{{ entrada.numero_factura }}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                
                <!-- Observaciones -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="3" 
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition">{{ entrada.observaciones }}</textarea>
                </div>
            </div>
            
            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium transition">
                    <i class="fas fa-save mr-2"></i> Guardar Cambios
                </button>
                <a href="/inventario/entradas/" class="bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-lg text-sm font-bold shadow-sm transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
