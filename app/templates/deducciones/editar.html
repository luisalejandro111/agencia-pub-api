<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Deducción - {{ deduccion.empleado.nombre_completo }}</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">👋 Editar Deducción</h1>
                <p class="text-gray-600 mt-1">Modificar información de la deducción</p>
            </div>

               <a href="/deducciones" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1 font-medium">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
            <form method="POST" action="/deducciones/actualizar/{{ deduccion.id }}" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Tipo de deducción -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Deducción *</label>
                        <select name="tipo_deduccion" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                required onchange="toggleMontoField(this.value)">
                            <option value="fijo" {% if deduccion.tipo_deduccion == 'fijo' %}selected{% endif %}>Monto Fijo ($)</option>
                            <option value="porcentaje" {% if deduccion.tipo_deduccion == 'porcentaje' %}selected{% endif %}>Porcentaje del Trabajo (%)</option>
                            <option value="monto_total" {% if deduccion.tipo_deduccion == 'monto_total' %}selected{% endif %}>Porcentaje del Monto Total (%)</option>
                        </select>
                    </div>
                    
                    <!-- Monto -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Monto *</label>
                        <input type="number" step="0.01" name="monto" id="montoInput"
                               value="{{ "%.2f"|format(deduccion.monto) }}"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               required min="0.01">
                    </div>
                    
                    <!-- Estado -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Estado *</label>
                        <select name="estado" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                required>
                            <option value="pendiente" {% if deduccion.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                            <option value="aplicada" {% if deduccion.estado == 'aplicada' %}selected{% endif %}>Aplicada</option>
                            <option value="cancelada" {% if deduccion.estado == 'cancelada' %}selected{% endif %}>Cancelada</option>
                        </select>
                    </div>
                </div>
                
                <!-- Motivo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Motivo *</label>
                    <select name="motivo" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required>
                        <option value="daño_material" {% if deduccion.motivo == 'daño_material' %}selected{% endif %}>Daño a material</option>
                        <option value="error_impresion" {% if deduccion.motivo == 'error_impresion' %}selected{% endif %}>Error en impresión</option>
                        <option value="retraso_entrega" {% if deduccion.motivo == 'retraso_entrega' %}selected{% endif %}>Retraso en entrega</option>
                        <option value="calidad_deficiente" {% if deduccion.motivo == 'calidad_deficiente' %}selected{% endif %}>Calidad deficiente</option>
                        <option value="perdida_equipo" {% if deduccion.motivo == 'perdida_equipo' %}selected{% endif %}>Pérdida de equipo</option>
                        <option value="otro" {% if deduccion.motivo == 'otro' %}selected{% endif %}>Otro</option>
                    </select>
                </div>
                
                <!-- Descripción -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción detallada *</label>
                    <textarea name="descripcion" rows="4" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              required>{{ deduccion.descripcion }}</textarea>
                </div>
                
                <!-- Observaciones -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="2" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{{ deduccion.observaciones }}</textarea>
                </div>
                
                <!-- Botones -->
                <div class="flex flex-col sm:flex-row gap-3 pt-4">
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition">
                        <i class="fas fa-save mr-2"></i> Guardar Cambios
                    </button>
                    <a href="/deducciones/ver/{{ deduccion.id }}" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-2 rounded-lg font-medium shadow-sm transition text-center">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
    function toggleMontoField(tipo) {
        const montoInput = document.getElementById('montoInput');
        if (tipo === 'fijo') {
            montoInput.placeholder = 'Ej: 50.00';
            montoInput.step = '0.01';
        } else {
            montoInput.placeholder = 'Ej: 5.00 (5%)';
            montoInput.step = '0.01';
        }
    }
    </script>
</body>
</html>
