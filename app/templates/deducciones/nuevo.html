<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Deducción - Empleados</title>
    <link rel="icon" type="image/x-icon" href="/static/logo2.ico">
    <link rel="shortcut icon" href="/static/logo2.ico">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">👋 Nueva Deducción</h1>
                <p class="text-gray-600 mt-1">Registrar deducción por daño en trabajo</p>
            </div>
               <a href="/deducciones" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1 font-medium">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <!-- Mensajes -->
        {% if error %}
        <div class="mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Formulario -->
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
            <form method="POST" action="/deducciones/crear" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Empleado -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Empleado *</label>
                        <select name="empleado_id" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                required onchange="cargarTrabajosEmpleado(this.value)">
                            <option value="">Seleccionar empleado</option>
                            {% for empleado in empleados %}
                            <option value="{{ empleado.id }}">{{ empleado.nombre_completo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                
<!-- Trabajo -->
<div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Trabajo *</label>
    <select name="trabajo_id" id="trabajoSelect"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            required>
        <option value="">Seleccionar trabajo</option>
    </select>
    <p id="trabajoLoading" class="text-sm text-gray-500 mt-1 hidden">Cargando trabajos...</p>
    <p id="trabajoError" class="text-sm text-red-500 mt-1 hidden">Error al cargar trabajos</p>
</div>
                    
                    <!-- Tipo de deducción -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Deducción *</label>
                        <select name="tipo_deduccion" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                required onchange="toggleMontoField(this.value)">
                            <option value="">Seleccionar tipo</option>
                            <option value="fijo">Monto Fijo ($)</option>
                            <option value="porcentaje">Porcentaje del Trabajo (%)</option>
                            <option value="monto_total">Porcentaje del Monto Total (%)</option>
                        </select>
                    </div>
                    
                    <!-- Monto -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Monto *</label>
                        <input type="number" step="0.01" name="monto" id="montoInput"
                               placeholder="0.00"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                               required min="0.01">
                    </div>
                </div>
                
                <!-- Motivo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Motivo *</label>
                    <select name="motivo" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                            required>
                        <option value="">Seleccionar motivo</option>
                        <option value="daño_material">Daño a material</option>
                        <option value="error_impresion">Error en impresión</option>
                        <option value="retraso_entrega">Retraso en entrega</option>
                        <option value="calidad_deficiente">Calidad deficiente</option>
                        <option value="perdida_equipo">Pérdida de equipo</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                
                <!-- Descripción -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción detallada *</label>
                    <textarea name="descripcion" rows="4" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                              placeholder="Describe el incidente, materiales afectados, costo estimado, etc." required></textarea>
                </div>
                
                <!-- Observaciones -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea name="observaciones" rows="2" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                              placeholder="Notas adicionales..."></textarea>
                </div>
                
                <!-- Botones -->
                <div class="flex flex-col sm:flex-row gap-3 pt-4">
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition">
                        <i class="fas fa-save mr-2"></i> Registrar Deducción
                    </button>
                    <a href="/deducciones" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-2 rounded-lg font-medium shadow-sm transition text-center">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
    function toggleMontoField(tipo) {
        const montoInput = document.getElementById('montoInput');
        if (tipo === 'fijo') {
            montoInput.placeholder = 'Ej: 50.00';
            montoInput.step = '0.01';
        } else {
            montoInput.placeholder = 'Ej: 5.00 (5%)';
            montoInput.step = '0.01';
        }
    }

function toggleMontoField(tipo) {
    const montoInput = document.getElementById('montoInput');
    if (tipo === 'fijo') {
        montoInput.placeholder = 'Ej: 50.00';
        montoInput.step = '0.01';
    } else {
        montoInput.placeholder = 'Ej: 5.00 (5%)';
        montoInput.step = '0.01';
    }
}


async function cargarTrabajosEmpleado(empleadoId) {
    const trabajoSelect = document.getElementById('trabajoSelect');
    const loading = document.getElementById('trabajoLoading');
    const error = document.getElementById('trabajoError');
    
    trabajoSelect.innerHTML = '<option value="">Seleccionar trabajo</option>';
    
    if (!empleadoId) return;
    
    loading.classList.remove('hidden');
    error.classList.add('hidden');
    
    try {
        const response = await fetch(`/api/trabajos/empleado/${empleadoId}`);
        const trabajos = await response.json();
        
        if (trabajos.length === 0) {
            trabajoSelect.innerHTML = '<option value="">No hay trabajos completados</option>';
        } else {
            let options = '<option value="">Seleccionar trabajo</option>';
            trabajos.forEach(trabajo => {
                options += `<option value="${trabajo.id}">${trabajo.nombre_trabajo}</option>`;
            });
            trabajoSelect.innerHTML = options;
        }
        
    } catch (err) {
        console.error('Error:', err);
        error.classList.remove('hidden');
        trabajoSelect.innerHTML = '<option value="">Error al cargar</option>';
    } finally {
        loading.classList.add('hidden');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const empleadoSelect = document.querySelector('select[name="empleado_id"]');
    if (empleadoSelect) {
        empleadoSelect.addEventListener('change', function() {
            cargarTrabajosEmpleado(this.value);
        });
    }
});


   
    </script>
</body>
</html>
